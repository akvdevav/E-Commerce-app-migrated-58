spring.application.name=product-service

# PostgreSQL datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ configuration (auto‑create queues/exchanges by the application)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Valkey (Redis‑compatible) cache configuration
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password= # uncomment if a password is set

# Service URLs for API Gateway routing (environment overrides allowed)
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8082/api/product}
order.service.url=${ORDER_SERVICE_URL:http://localhost:8083/api/order}
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8081/api/inventory}

# Swagger/OpenAPI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

server.port=8082