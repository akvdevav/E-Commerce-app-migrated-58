spring.application.name=product-service

# PostgreSQL datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ configuration (auto‑create queues/exchanges by the application)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Valkey (Redis‑compatible) cache configuration
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password= # uncomment if a password is set

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

server.port=8082

inventory.service.url=http://localhost:8081/api/inventory