spring.application.name=product-service

# PostgreSQL datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ configuration (defaults to localhost)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Valkey (Redis-compatible) configuration
spring.redis.host=localhost
spring.redis.port=6379

# Service URLs for API Gateway (default values to avoid placeholder resolution errors)
product.service.url=http://localhost:8082/api/product
order.service.url=http://localhost:8083/api/order
inventory.service.url=http://localhost:8081/api/inventory

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

server.port=8082