spring.application.name=product-service

# PostgreSQL datasource configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ configuration (default local instance)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Valkey (Redis-compatible) configuration
spring.redis.host=localhost
spring.redis.port=6379

# Swagger UI and API Docs paths
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Server port
server.port=8082

# External service URLs
inventory.service.url=http://localhost:8081/api/inventory
product.service.url=http://localhost:8082/api/product
order.service.url=http://localhost:8083/api/order