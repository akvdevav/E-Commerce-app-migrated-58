spring.application.name=product-service

# Server configuration
server.port=8082

# PostgreSQL datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ configuration (defaults to localhost)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Valkey (Redis-compatible) configuration
spring.redis.host=localhost
spring.redis.port=6379

# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# External service URLs
inventory.service.url=http://localhost:8081/api/inventory
product.service.url=http://localhost:8082/api/product
order.service.url=http://localhost:8083/api/order